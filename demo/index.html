<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MirageIndex Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070807;
      --panel: #10120d;
      --panel-strong: #181b13;
      --text: #f5f1e8;
      --muted: #a5ad99;
      --line: #34382f;
      --accent: #c6ff4d;
      --accent-strong: #ffb86b;
      --risk: #ff5c7a;
      --ok: #72e06a;
      --assistant: #122022;
      --user: #211629;
      --glow: rgba(198, 255, 77, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, var(--bg) 0%, #10120d 52%, #160f19 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      place-items: center;
    }

    main {
      width: min(980px, 100vw);
      height: min(760px, 100vh);
      background: rgba(16, 18, 13, 0.96);
      border: 1px solid var(--line);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.52), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, var(--panel-strong), rgba(16, 18, 13, 0.9));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
      color: #ffffff;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    #messages {
      min-height: 0;
      overflow-y: auto;
      padding: 18px 20px;
      background:
        linear-gradient(rgba(245, 241, 232, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245, 241, 232, 0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 82%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      line-height: 1.45;
      font-size: 15px;
      white-space: pre-wrap;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.24);
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--user), #2d2031);
      border-color: rgba(255, 184, 107, 0.32);
    }

    .message.assistant {
      align-self: flex-start;
      background: linear-gradient(135deg, var(--assistant), #16271d);
      border-color: rgba(198, 255, 77, 0.26);
    }

    .meta {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(244, 247, 251, 0.12);
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
    }

    .score {
      font-weight: 700;
    }

    .score.ok {
      color: var(--ok);
    }

    .score.risk {
      color: var(--risk);
    }

    form {
      padding: 14px 20px 18px;
      border-top: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(16, 18, 13, 0.96), var(--panel-strong));
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 54px;
      max-height: 160px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0a0d0a;
      color: var(--text);
      padding: 12px;
      font: inherit;
      line-height: 1.35;
      outline: none;
    }

    textarea::placeholder {
      color: #79816f;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    button {
      height: 54px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #111405;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(198, 255, 77, 0.2);
    }

    button:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    button:disabled {
      opacity: 0.55;
      cursor: wait;
      box-shadow: none;
    }

    @media (max-width: 700px) {
      main {
        height: 100vh;
        border: 0;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }

      .message {
        max-width: 100%;
      }

      form {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>MirageIndex Chat Demo</h1>
      <div id="status" class="status">Qwen3 answer + encoder hallucination score</div>
    </header>

    <section id="messages" aria-live="polite"></section>

    <form id="chat-form">
      <textarea id="question" placeholder="Type a question..." autocomplete="off" required></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <script>
    const form = document.getElementById("chat-form");
    const input = document.getElementById("question");
    const messages = document.getElementById("messages");
    const statusEl = document.getElementById("status");
    const send = document.getElementById("send");

    function appendMessage(role, text, meta) {
      const el = document.createElement("article");
      el.className = `message ${role}`;
      el.textContent = text;

      if (meta) {
        const info = document.createElement("div");
        info.className = "meta";

        const score = document.createElement("span");
        const isRisk = meta.prediction === "yes";
        score.className = `score ${isRisk ? "risk" : "ok"}`;
        score.textContent = `hallucination score: ${meta.score.toFixed(4)}`;
        info.appendChild(score);

        const prediction = document.createElement("span");
        prediction.textContent = `prediction: ${meta.prediction}`;
        info.appendChild(prediction);

        el.appendChild(info);
      }

      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const question = input.value.trim();
      if (!question) {
        return;
      }

      input.value = "";
      input.style.height = "";
      appendMessage("user", question);
      send.disabled = true;
      statusEl.textContent = "Generating with Qwen3, then scoring...";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({question})
        });
        const raw = await response.text();
        let payload = {};
        try {
          payload = raw ? JSON.parse(raw) : {};
        } catch {
          payload = {error: raw || response.statusText};
        }
        if (!response.ok) {
          const prefix = payload.error_type ? `${payload.error_type}: ` : "";
          throw new Error(`${prefix}${payload.error || response.statusText || "Request failed"}`);
        }
        appendMessage("assistant", payload.answer, {
          score: payload.hallucination_score,
          prediction: payload.prediction,
          threshold: payload.threshold,
          aggregation: payload.aggregation,
          chunk_count: payload.chunk_count
        });
        statusEl.textContent = "Ready";
      } catch (error) {
        appendMessage("assistant", `Error: ${error.message}`);
        statusEl.textContent = "Request failed";
      } finally {
        send.disabled = false;
        input.focus();
      }
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
